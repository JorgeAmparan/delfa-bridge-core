# docyan-lde-redis — Redis compartido self-hosted (B2.1).
# 5º proceso de la topología DOCYAN. Doble propósito (un solo Redis):
#   - Cola de jobs de ingesta (B2, REDIS_QUEUE_URL).
#   - Session Manager + APScheduler backend (B4, decisión #6 Paso C).
# Levantado como Fly app aparte por coherencia con la topología de procesos
# separados (cada componente escala/respalda independiente).
#
# Deploy (PENDIENTE DE JORGE — ver redis/README.md). DESDE redis/ (no la raíz),
# para que el build context sea redis/ y el .dockerignore de la raíz (que excluye
# todo salvo el backend) NO aplique — verificado empíricamente (B2.1 2/2):
#   flyctl apps create docyan-lde-redis
#   flyctl volumes create redis_data --region dfw --size 5 --app docyan-lde-redis
#   cd redis && flyctl deploy --app docyan-lde-redis
#
app = "docyan-lde-redis"
primary_region = "dfw"

# Deploy DESDE redis/ → context = redis/, config = ./fly.toml (auto-detectado),
# dockerfile = ./Dockerfile. Así `COPY redis.conf` del Dockerfile resuelve y el
# .dockerignore de la raíz no recorta el context. NO desplegar desde la raíz.
[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "redis_data"
  destination = "/data"

# Servicio TCP interno (compatible Redis). SIN http_service público: solo se
# alcanza desde la red privada de Fly (docyan-lde-redis.internal:6379 / *.flycast).
[[services]]
  internal_port = 6379
  protocol = "tcp"
  # min_machines_running = 1 + sin auto_stop: cola y sesiones no deben dormirse.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  [[services.ports]]
    port = 6379

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

# Redis es ligero (tier alfa). shared-cpu-1x / 512 MB (headroom para AOF rewrite).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
