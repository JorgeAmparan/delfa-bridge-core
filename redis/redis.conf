# docyan-lde-redis — configuración (B2.1).
# Redis compartido: cola de ingesta (B2) + sesiones MO/APScheduler (B4, decisión #6).

# ── Persistencia ──────────────────────────────────────────────────────────────
# AOF: la cola de jobs y las sesiones no pueden perderse en un reinicio. everysec
# = fsync cada segundo (balance durabilidad/throughput; cota de pérdida ~1s).
appendonly yes
appendfsync everysec
# Directorio de datos = volumen persistente montado en /data (ver fly.toml).
dir /data

# ── Memoria ───────────────────────────────────────────────────────────────────
# Límite para tier alfa. noeviction: la cola y las sesiones NO deben evictarse
# silenciosamente — si la memoria se llena, Redis falla EXPLÍCITAMENTE en escritura
# (preferible a perder jobs/sesiones sin aviso).
maxmemory 256mb
maxmemory-policy noeviction

# ── Red ───────────────────────────────────────────────────────────────────────
# Acceso SOLO por la red privada de Fly (flycast / .internal); no hay handler
# público. protected-mode no + bind 0.0.0.0 para escuchar en las interfaces
# internas de la máquina Fly. Mismo patrón que docyan-lde-graph (privado).
protected-mode no
bind 0.0.0.0
