app = "docyan-lde-api"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONPATH = "/app"
  DATA_DIR = "/app/data"
  PORT = "8000"
  # Endpoints internos NO sensibles (lugar canónico = [env], igual que worker/fly.toml).
  # Los SECRETS reales (Supabase, API keys, JWT) se fijan con `flyctl secrets set`
  # — ver docs/runbook_secrets_produccion.md. NO poner secrets aquí.
  FALKOR_HOST = "docyan-lde-graph.internal"
  FALKOR_PORT = "6379"
  EMBEDDER_URL = "http://docyan-lde-embedder.internal:8000"
  BGE_M3_TIMEOUT = "30"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
