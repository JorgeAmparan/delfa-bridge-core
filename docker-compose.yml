version: "3.9"

services:

  docyan-api:
    build: .
    container_name: docyan-lde-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - docyan-graph
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── DKG: FalkorDB local (espejo de docyan-lde-graph en Fly). B1 §3 / §13. ──
  # Mismo pin por digest que fly.graph.toml (módulo graph v4.18.0).
  docyan-graph:
    image: falkordb/falkordb@sha256:58a95a33d591b25648bbb13268a23329aa39e70b4cbeff0752c65f8b4beba6db
    container_name: docyan-lde-graph
    ports:
      - "6379:6379"
    command: ["--appendonly", "yes", "--appendfsync", "everysec", "--dir", "/data"]
    volumes:
      - graph_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Embedder: BGE-M3 local (espejo de docyan-lde-embedder en Fly). B1 §4. ──
  docyan-embedder:
    build: ./embedder
    container_name: docyan-lde-embedder
    ports:
      - "8080:8000"
    environment:
      - BGE_MODEL_NAME=BAAI/bge-m3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  docyan-dii:
    build: .
    container_name: docyan-lde-dii
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

  docyan-edb:
    build: .
    container_name: docyan-lde-edb
    ports:
      - "8002:8002"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8002"]
    restart: unless-stopped

  docyan-grg:
    build: .
    container_name: docyan-lde-grg
    ports:
      - "8003:8003"
    env_file:
      - .env
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8003"]
    restart: unless-stopped

  docyan-matrix:
    build: .
    container_name: docyan-lde-matrix
    ports:
      - "8004:8004"
    env_file:
      - .env
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8004"]
    restart: unless-stopped

networks:
  default:
    name: docyan-network

volumes:
  data:
    driver: local
  graph_data:
    driver: local